version: "3.9"

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://venturelift:venturelift@db:5432/venturelift?schema=public
      - JWT_SECRET=${JWT_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CORS_ORIGIN=http://localhost:5173,http://localhost:8000
      - REDIS_URL=redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: venturelift
      POSTGRES_PASSWORD: venturelift
      POSTGRES_DB: venturelift
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U venturelift"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  ml-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ml
    ports:
      - "8001:8001"
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
